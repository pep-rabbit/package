services:
  api:
    build:
      context: ./DeLiki
    container_name: deliki-api
    expose:
      - "8080"

  nginx:
    image: nginx:1.27-alpine
    container_name: deliki-nginx
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./Nginx/web:/usr/share/nginx/html:ro
      - ./Nginx/default.conf:/etc/nginx/conf.d/default.conf:ro